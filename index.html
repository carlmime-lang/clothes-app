<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>옷 확인 앱</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f5f5f5;
}

.screen { display: none; }
.active { display: block; }

button {
  font-size: 20px;
  padding: 15px;
  margin: 10px;
  width: 80%;
  border: none;
  border-radius: 10px;
}

.big {
  font-size: 26px;
  background: #4CAF50;
  color: white;
}

.teacher {
  background: #607D8B;
  color: white;
}

.back {
  background: #999;
  color: white;
}
</style>
</head>

<body>

<!-- 홈 -->
<div id="home" class="screen active">
  <h2>👕 옷 확인 앱</h2>
  <button class="teacher" onclick="show('teacher')">👩‍🏫 교사용</button>
  <button class="big" onclick="show('student')">👦 학생용</button>
</div>

<!-- 교사용 -->
<div id="teacher" class="screen">
  <h2>👩‍🏫 옷 등록 (학습)</h2>
  <p>Teachable Machine에서 학습합니다</p>

  <button class="teacher" onclick="openTrain()">옷 등록하기</button>

  <br>
  <button class="back" onclick="show('home')">뒤로</button>
</div>

<!-- 학생용 -->
<div id="student" class="screen">
  <h2>👦 옷 확인</h2>

  <button class="big" onclick="start()">시작</button>

  <div id="webcam"></div>
  <div id="result"></div>

  <br>
  <button class="back" onclick="show('home')">뒤로</button>
</div>

<!-- 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>

// 모델 & 학습 URL
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/WMkucO1Ey/";
const TRAIN_URL = "https://teachablemachine.withgoogle.com/train/image/1GgdkPW2342neXZijD8jNARBOZStCcQ2P";

// 화면 전환
function show(page) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

// 교사용
function openTrain() {
  window.open(TRAIN_URL, "_blank");
}

// 🔊 음성 함수
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "ko-KR";
  window.speechSynthesis.cancel(); // 중복 방지
  window.speechSynthesis.speak(msg);
}

let model, webcam;
let lastState = ""; // 중복 음성 방지

// 시작
async function start() {
  try {
    const modelURL = MODEL_URL + "model.json";
    const metaURL = MODEL_URL + "metadata.json";

    model = await tmImage.load(modelURL, metaURL);

    webcam = new tmImage.Webcam(300, 300, true);
    await webcam.setup();
    await webcam.play();

    document.getElementById("webcam").innerHTML = "";
    document.getElementById("webcam").appendChild(webcam.canvas);

    loop();
  } catch (e) {
    console.error(e);
    alert("카메라 실행 오류");
  }
}

// 반복
async function loop() {
  webcam.update();
  await predict();
  requestAnimationFrame(loop);
}

// 예측 + 음성
async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let text = "";
  let currentState = "";

  prediction.forEach(p => {
    if (p.className === "앞" && p.probability > 0.8) {
      text = "👍 잘 입었어요!";
      currentState = "good";
    }
    if (p.className === "뒤" && p.probability > 0.8) {
      text = "❌ 반대로 입었어요!";
      currentState = "bad";
    }
  });

  // 상태 바뀔 때만 음성 출력
  if (currentState !== "" && currentState !== lastState) {
    if (currentState === "good") {
      speak("잘 입었어요");
    }
    if (currentState === "bad") {
      speak("다시 생각해봐요");
    }
    lastState = currentState;
  }

  document.getElementById("result").innerHTML =
    "<h2 style='font-size:30px'>" + text + "</h2>";
}

</script>

</body>
</html>
