<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>옷 확인 앱</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin: 0;
  transition: background 0.3s;
}

.screen { display: none; }
.active { display: block; }

button {
  font-size: 22px;
  padding: 18px;
  margin: 10px;
  width: 85%;
  border: none;
  border-radius: 12px;
}

.big { background: #4CAF50; color: white; }
.teacher { background: #607D8B; color: white; }
.back { background: #999; color: white; }

#webcam canvas {
  width: 700px;
  height: 700px;
  max-width: 95%;
  border-radius: 20px;
}

#emoji {
  font-size: 90px;
  margin-top: 10px;
}

#resultText {
  font-size: 40px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="home" class="screen active">
  <h2>👕 옷 확인 앱</h2>
  <button class="teacher" onclick="show('teacher')">👩‍🏫 교사용</button>
  <button class="big" onclick="show('student')">👦 학생용</button>
</div>

<div id="teacher" class="screen">
  <h2>👩‍🏫 옷 등록</h2>
  <button class="teacher" onclick="openTrain()">옷 등록하기</button>
  <br><button class="back" onclick="show('home')">뒤로</button>
</div>

<div id="student" class="screen">
  <h2>👦 옷 확인</h2>
  <button class="big" onclick="start()">시작</button>

  <div id="webcam"></div>

  <div id="emoji">🙂</div>
  <div id="resultText">준비됐어요</div>

  <br><button class="back" onclick="show('home')">뒤로</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>

const MODEL_URL = "https://teachablemachine.withgoogle.com/models/WMkucO1Ey/";
const TRAIN_URL = "https://teachablemachine.withgoogle.com/train/image/1GgdkPW2342neXZijD8jNARBOZStCcQ2P";

function show(page) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function openTrain() {
  location.href = TRAIN_URL;
}

// 🔊 오디오 (겹침 방지)
let currentAudio = null;

function playSound(src) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  const audio = new Audio(src);
  audio.play().catch(()=>{});
  currentAudio = audio;
}

// 🔥 상태 안정화 변수
let stableState = "";
let stateCount = 0;
const STABLE_THRESHOLD = 2;

let lastState = "";

let model, webcam;

async function start() {
  const modelURL = MODEL_URL + "model.json";
  const metaURL = MODEL_URL + "metadata.json";

  model = await tmImage.load(modelURL, metaURL);

  webcam = new tmImage.Webcam(700, 700, true);
  await webcam.setup();
  await webcam.play();

  document.getElementById("webcam").innerHTML = "";
  document.getElementById("webcam").appendChild(webcam.canvas);

  loop();
}

async function loop() {
  webcam.update();
  await predict();
  requestAnimationFrame(loop);
}

async function predict() {

  const prediction = await model.predict(webcam.canvas);

  let best = prediction.reduce((a, b) =>
    a.probability > b.probability ? a : b
  );

  let currentState = "";

  if (best.probability > 0.7) {
    if (best.className === "앞") currentState = "good";
    if (best.className === "뒤") currentState = "bad";
  }

  // 🔥 안정화 로직
  if (currentState === stableState) {
    stateCount++;
  } else {
    stableState = currentState;
    stateCount = 1;
  }

  if (stateCount >= STABLE_THRESHOLD) {

    if (stableState === "good") {
      document.body.style.background = "#d4edda";
      document.getElementById("emoji").innerText = "👍";
      document.getElementById("resultText").innerText = "잘 입었어요!";

      if (lastState !== "good") {
        playSound("good.mp3");
        lastState = "good";
      }
    }

    else if (stableState === "bad") {
      document.body.style.background = "#f8d7da";
      document.getElementById("emoji").innerText = "❌";
      document.getElementById("resultText").innerText = "다시 생각해봐요";

      if (lastState !== "bad") {
        playSound("bad.mp3");
        lastState = "bad";
      }
    }

  } else {
    document.body.style.background = "#eeeeee";
    document.getElementById("emoji").innerText = "🙂";
    document.getElementById("resultText").innerText = "확인 중...";
  }
}

</script>

</body>
</html>
