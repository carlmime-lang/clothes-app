<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>옷 확인 앱</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin: 0;
  transition: background 0.3s;
}

/* 흔들림 효과 */
@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(4px,0); }
  50% { transform: translate(-4px,0); }
  75% { transform: translate(4px,0); }
  100% { transform: translate(0,0); }
}

.shake {
  animation: shake 0.3s;
}

.screen { display: none; }
.active { display: block; }

button {
  font-size: 22px;
  padding: 18px;
  margin: 10px;
  width: 85%;
  border: none;
  border-radius: 12px;
}

.big { background: #4CAF50; color: white; }
.teacher { background: #607D8B; color: white; }
.back { background: #999; color: white; }

#webcam canvas {
  width: 700px;
  height: 700px;
  max-width: 95%;
  border-radius: 20px;
}

/* 이모지 애니메이션 */
@keyframes pop {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

.pop {
  animation: pop 0.3s;
}

#emoji {
  font-size: 100px;
  margin-top: 10px;
}

#resultText {
  font-size: 40px;
  margin-top: 10px;
}

/* 진행 바 */
#barContainer {
  width: 80%;
  height: 20px;
  background: #ddd;
  margin: 10px auto;
  border-radius: 10px;
}

#bar {
  height: 100%;
  width: 0%;
  background: green;
  border-radius: 10px;
  transition: width 0.2s;
}
</style>
</head>

<body>

<div id="home" class="screen active">
  <h2>👕 옷 확인 앱</h2>
  <button class="teacher" onclick="show('teacher')">👩‍🏫 교사용</button>
  <button class="big" onclick="show('student')">👦 학생용</button>
</div>

<div id="teacher" class="screen">
  <h2>👩‍🏫 옷 등록</h2>
  <button class="teacher" onclick="openTrain()">옷 등록하기</button>
  <br><button class="back" onclick="show('home')">뒤로</button>
</div>

<div id="student" class="screen">
  <h2>👦 옷 확인</h2>
  <button class="big" onclick="start()">시작</button>

  <div id="webcam"></div>

  <div id="emoji">🙂</div>
  <div id="resultText">준비됐어요</div>

  <!-- 🔥 진행바 -->
  <div id="barContainer">
    <div id="bar"></div>
  </div>

  <br><button class="back" onclick="show('home')">뒤로</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>

const MODEL_URL = "https://teachablemachine.withgoogle.com/models/WMkucO1Ey/";
const TRAIN_URL = "https://teachablemachine.withgoogle.com/train/image/1GgdkPW2342neXZijD8jNARBOZStCcQ2P";

function show(page) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function openTrain() {
  location.href = TRAIN_URL;
}

// 🔊 소리
let currentAudio = null;

function playSound(src) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  const audio = new Audio(src);
  audio.play().catch(()=>{});
  currentAudio = audio;
}

let lastState = "";
let stableState = "";
let count = 0;
const THRESHOLD = 2;

let model, webcam;

async function start() {

  const modelURL = MODEL_URL + "model.json";
  const metaURL = MODEL_URL + "metadata.json";

  model = await tmImage.load(modelURL, metaURL);

  webcam = new tmImage.Webcam(700, 700, true);
  await webcam.setup();
  await webcam.play();

  document.getElementById("webcam").innerHTML = "";
  document.getElementById("webcam").appendChild(webcam.canvas);

  loop();
}

async function loop() {
  webcam.update();
  await predict();
  requestAnimationFrame(loop);
}

async function predict() {

  const prediction = await model.predict(webcam.canvas);

  let best = prediction.reduce((a, b) =>
    a.probability > b.probability ? a : b
  );

  // 📊 안정도 바
  document.getElementById("bar").style.width =
    Math.min(best.probability * 100, 100) + "%";

  let currentState = "";

  if (best.className === "앞" && best.probability > 0.7) {
    currentState = "good";
  }

  if (best.className === "뒤" && best.probability > 0.6) {
    currentState = "bad";
  }

  // 🔥 안정화
  if (currentState === stableState) {
    count++;
  } else {
    stableState = currentState;
    count = 1;
  }

  if (count >= THRESHOLD) {

    // 👍 잘 입음
    if (stableState === "good" && lastState !== "good") {

      document.body.style.background = "#d4edda";
      document.getElementById("emoji").innerText = "👍";
      document.getElementById("resultText").innerText = "잘 입었어요!";

      document.getElementById("emoji").classList.add("pop");

      playSound("good.mp3");
      lastState = "good";
    }

    // ❌ 잘못 입음
    else if (stableState === "bad" && lastState !== "bad") {

      document.body.style.background = "#f8d7da";
      document.getElementById("emoji").innerText = "❌";
      document.getElementById("resultText").innerText = "다시 생각해봐요";

      document.body.classList.add("shake");
      document.getElementById("emoji").classList.add("pop");

      setTimeout(()=> {
        document.body.classList.remove("shake");
      }, 300);

      playSound("bad.mp3");
      lastState = "bad";
    }

  } else {
    document.body.style.background = "#eeeeee";
    document.getElementById("emoji").innerText = "🙂";
    document.getElementById("resultText").innerText = "확인 중...";
  }
}

</script>

</body>
</html>
