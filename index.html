<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>옷 확인 앱</title>

<style>
body { font-family: sans-serif; text-align: center; background: #f5f5f5; }
.screen { display: none; }
.active { display: block; }

button {
  font-size: 20px;
  padding: 15px;
  margin: 10px;
  width: 80%;
  border: none;
  border-radius: 10px;
}

.big { background: #4CAF50; color: white; }
.teacher { background: #607D8B; color: white; }
.back { background: #999; color: white; }

#webcam canvas {
  width: 600px;
  height: 600px;
  max-width: 95%;
  border-radius: 15px;
}
</style>
</head>

<body>

<div id="home" class="screen active">
  <h2>👕 옷 확인 앱</h2>
  <button class="teacher" onclick="show('teacher')">👩‍🏫 교사용</button>
  <button class="big" onclick="show('student')">👦 학생용</button>
</div>

<div id="teacher" class="screen">
  <h2>👩‍🏫 옷 등록</h2>
  <button class="teacher" onclick="openTrain()">옷 등록하기</button>
  <br><button class="back" onclick="show('home')">뒤로</button>
</div>

<div id="student" class="screen">
  <h2>👦 옷 확인</h2>
  <button class="big" onclick="start()">시작</button>
  <div id="webcam"></div>
  <div id="result"></div>
  <br><button class="back" onclick="show('home')">뒤로</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>

const MODEL_URL = "https://teachablemachine.withgoogle.com/models/WMkucO1Ey/";
const TRAIN_URL = "https://teachablemachine.withgoogle.com/train/image/1GgdkPW2342neXZijD8jNARBOZStCcQ2P";

function show(page) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function openTrain() {
  location.href = TRAIN_URL;
}

// 🔊 오디오 (필요할 때만 재생)
const goodSound = new Audio("good.mp3");
const badSound = new Audio("bad.mp3");
const dingSound = new Audio("ding.mp3");
const alertSound = new Audio("alert.mp3");

dingSound.volume = 0.6;
alertSound.volume = 0.6;

let lastState = "";
let model, webcam;

// 시작 (소리 관련 코드 없음!)
async function start() {
  try {
    const modelURL = MODEL_URL + "model.json";
    const metaURL = MODEL_URL + "metadata.json";

    model = await tmImage.load(modelURL, metaURL);

    webcam = new tmImage.Webcam(600, 600, true);
    await webcam.setup();
    await webcam.play();

    document.getElementById("webcam").innerHTML = "";
    document.getElementById("webcam").appendChild(webcam.canvas);

    loop();
  } catch (e) {
    console.error(e);
    alert("카메라 오류");
  }
}

async function loop() {
  webcam.update();
  await predict();
  requestAnimationFrame(loop);
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let best = prediction.reduce((a, b) =>
    a.probability > b.probability ? a : b
  );

  let text = "";
  let currentState = "";

  // 👉 확률 기준
  if (best.probability > 0.7) {

    if (best.className === "앞") {
      text = "👍 잘 입었어요!";
      currentState = "good";
    }

    if (best.className === "뒤") {
      text = "❌ 반대로 입었어요!";
      currentState = "bad";
    }

  } else {
    text = "🤔 다시 확인해보세요";
    currentState = "";
  }

  // 🔊 효과음 + 음성 (여기서만 재생!)
  if (currentState !== "" && currentState !== lastState) {

    if (currentState === "good") {
      dingSound.currentTime = 0;
      dingSound.play();

      setTimeout(() => {
        goodSound.currentTime = 0;
        goodSound.play();
      }, 500);
    }

    if (currentState === "bad") {
      alertSound.currentTime = 0;
      alertSound.play();

      setTimeout(() => {
        badSound.currentTime = 0;
        badSound.play();
      }, 500);
    }

    lastState = currentState;
  }

  document.getElementById("result").innerHTML =
    "<h2 style='font-size:35px'>" + text + "</h2>";
}

</script>

</body>
</html>
