<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>옷 확인 앱</title>

<style>
body { font-family: sans-serif; text-align: center; background: #f5f5f5; }
.screen { display: none; }
.active { display: block; }

button {
  font-size: 20px;
  padding: 15px;
  margin: 10px;
  width: 80%;
  border: none;
  border-radius: 10px;
}

.big { background: #4CAF50; color: white; }
.teacher { background: #607D8B; color: white; }
.back { background: #999; color: white; }

#webcam canvas {
  width: 600px;
  height: 600px;
  max-width: 95%;
  border-radius: 15px;
}
</style>
</head>

<body>

<div id="home" class="screen active">
  <h2>👕 옷 확인 앱</h2>
  <button class="teacher" onclick="show('teacher')">👩‍🏫 교사용</button>
  <button class="big" onclick="show('student')">👦 학생용</button>
</div>

<div id="teacher" class="screen">
  <h2>👩‍🏫 옷 등록</h2>
  <button class="teacher" onclick="openTrain()">옷 등록하기</button>
  <br><button class="back" onclick="show('home')">뒤로</button>
</div>

<div id="student" class="screen">
  <h2>👦 옷 확인</h2>
  <button class="big" onclick="start()">시작</button>
  <div id="webcam"></div>
  <div id="result"></div>
  <br><button class="back" onclick="show('home')">뒤로</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>

const MODEL_URL = "https://teachablemachine.withgoogle.com/models/WMkucO1Ey/";
const TRAIN_URL = "https://teachablemachine.withgoogle.com/train/image/1GgdkPW2342neXZijD8jNARBOZStCcQ2P";

function show(page) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function openTrain() {
  location.href = TRAIN_URL;
}

// 🔊 현재 재생 중인 오디오
let currentAudio = null;

// 🔊 소리 재생 함수 (겹침 방지)
function playSound(src, volume=1) {

  // 🔇 이전 소리 끄기
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  // 🔊 새 소리
  const audio = new Audio(src);
  audio.volume = volume;
  audio.play().catch(()=>{});

  currentAudio = audio;
}

let lastState = "";
let model, webcam;

async function start() {
  try {
    const modelURL = MODEL_URL + "model.json";
    const metaURL = MODEL_URL + "metadata.json";

    model = await tmImage.load(modelURL, metaURL);

    webcam = new tmImage.Webcam(600, 600, true);
    await webcam.setup();
    await webcam.play();

    document.getElementById("webcam").innerHTML = "";
    document.getElementById("webcam").appendChild(webcam.canvas);

    loop();
  } catch (e) {
    console.error(e);
    alert("카메라 오류");
  }
}

async function loop() {
  webcam.update();
  await predict();
  requestAnimationFrame(loop);
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let best = prediction.reduce((a, b) =>
    a.probability > b.probability ? a : b
  );

  let text = "";
  let currentState = "";

  if (best.probability > 0.7) {

    if (best.className === "앞") {
      text = "👍 잘 입었어요!";
      currentState = "good";
    }

    if (best.className === "뒤") {
      text = "❌ 반대로 입었어요!";
      currentState = "bad";
    }

  } else {
    text = "🤔 다시 확인해보세요";
    currentState = "";
  }

  // 🔊 소리 처리 (겹침 없음)
  if (currentState !== "" && currentState !== lastState) {

    if (currentState === "good") {
      playSound("ding.mp3", 0.6);

      setTimeout(() => {
        playSound("good.mp3");
      }, 500);
    }

    if (currentState === "bad") {
      playSound("alert.mp3", 0.6);

      setTimeout(() => {
        playSound("bad.mp3");
      }, 500);
    }

    lastState = currentState;
  }

  document.getElementById("result").innerHTML =
    "<h2 style='font-size:35px'>" + text + "</h2>";
}

</script>

</body>
</html>
